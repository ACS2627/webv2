<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test Telegram & n8n</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* Uso de variables nativas de Telegram para el diseño */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #222222);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .card {
            background-color: var(--tg-theme-secondary-bg-color, #ffffff);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 300px;
        }

        button {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.8;
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="card">
        <h3>Prueba Local 🚀</h3>
        <p>Pulsa el botón para enviar tu ID a n8n.</p>
        <button id="btnEnviar">Enviar a n8n</button>
    </div>

    <script>
        // 1. Inicializar la Web App de Telegram
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Hace que la app ocupe toda la pantalla del chat

        document.getElementById('btnEnviar').addEventListener('click', () => {
            // 2. Extraer datos del usuario (Esto solo funciona si se abre desde Telegram)
            const user = tg.initDataUnsafe?.user;
            const userId = user ? user.id : 'ID_TEST_LOCAL';
            const userName = user ? user.first_name : 'Usuario Dev';

            // 3. LA URL DE TU WEBHOOK EN N8N (Debe ser un webhook de tipo POST)
            const n8nWebhookUrl = 'http://localhost:5678/webhook-test/recibir-datos-webapp';

            // Damos feedback visual al usuario
            tg.MainButton.text = "Enviando...";
            tg.MainButton.show();

            // 4. Enviar los datos por POST a n8n
            fetch(n8nWebhookUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    telegram_id: userId,
                    nombre: userName,
                    accion: 'solicitud_contacto',
                    timestamp: new Date().toISOString()
                })
            })
            .then(response => {
                tg.MainButton.hide();
                // Mostramos una alerta nativa de Telegram y cerramos la app al aceptar
                tg.showAlert('¡Datos enviados con éxito a n8n!', () => {
                    tg.close(); 
                });
            })
            .catch(error => {
                console.error('Error de red:', error);
                tg.MainButton.hide();
                tg.showAlert('Error al conectar con el servidor.');
            });
        });
    </script>
</body>
</html>
