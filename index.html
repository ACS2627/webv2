<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Telegram WebApp Test</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 30px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #2ea6ff;
      color: white;
      margin-top: 20px;
    }

    button:disabled {
      background: gray;
      cursor: not-allowed;
    }

    .box {
      margin-top: 20px;
      padding: 15px;
      background: #222;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h2>🚀 WebApp Telegram Test</h2>

  <div class="box">
    <p id="status">Inicializando...</p>
    <p id="attempts">Intentos: 0 / 3</p>
  </div>

  <button id="startBtn">Iniciar flujo en n8n</button>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe?.user;
    const userId = user?.id || "guest";

    const storageKey = "attempts_" + userId;

    let attempts = parseInt(localStorage.getItem(storageKey)) || 0;

    const statusEl = document.getElementById("status");
    const attemptsEl = document.getElementById("attempts");
    const btn = document.getElementById("startBtn");

    function updateUI() {
      attemptsEl.innerText = `Intentos: ${attempts} / 3`;

      if (attempts >= 3) {
        btn.disabled = true;
        statusEl.innerText = "❌ Límite de intentos alcanzado";
      } else {
        statusEl.innerText = `👤 Usuario: ${user?.first_name || "desconocido"}`;
      }
    }

    updateUI();

    btn.addEventListener("click", async () => {
      if (attempts >= 3) return;

      attempts++;
      localStorage.setItem(storageKey, attempts);

      updateUI();

      try {
        const res = await fetch("https://numerator-algorithm-chain.ngrok-free.dev/webhook/recibir-datos-webapp", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            user: user,
            initData: tg.initData,
            attempt: attempts
          })
        });

        if (res.ok) {
          statusEl.innerText = "✅ Enviado a n8n correctamente";
        } else {
          statusEl.innerText = "⚠️ Error enviando a n8n";
        }

      } catch (err) {
        console.error(err);
        statusEl.innerText = "❌ Error de conexión";
      }
    });
  </script>

</body>
</html>
